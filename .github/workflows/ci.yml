      # Step 1: Compile comm-parent and create common.jar
      - name: Build local SDK modules
        run: |
          set -e

          echo "Building YOP SDK..."
          if [ -d "lib/yop-java-sdk-4.3.3-20230421155139-saas" ]; then
            cd lib/yop-java-sdk-4.3.3-20230421155139-saas
            mvn clean install -DskipTests
            cd -
          fi

          echo "Building Meituan SDK..."
          if [ -d "lib/meituan-union-java" ]; then
            cd lib/meituan-union-java
            mvn clean install -DskipTests
            cd -
          fi 

      - name: Compile ALL
        run: |
          mvn clean install -DskipTests
          echo "Download finished and jars generated successfully!"

      - name: CHECK DIRS
        run: |
          mv mshop-admin/target/mshop-admin-5.1.0.jar /www/wwwroot/cpsmanager.hngckj.top/tmp/
#          mv mshop-app/target/mshop-app-5.1.0.jar /www/wwwroot/cpsapi.hngckj.top/tmp/
#
      - name: Deploy Admin safely
        run: |
            APP_DIR=/www/wwwroot/cpsmanager.hngckj.top
            APP_NAME=mshop-admin-5.1.0.jar
            PID_FILE="$APP_DIR/$APP_NAME.pid"
            FULL_PATH="$APP_DIR/$APP_NAME"
            cd $APP_DIR
            if [ -f "$APP_NAME" ]; then
              i=1
              while [ -f "$APP_NAME.bak$i" ]; do i=$((i+1)); done
              cp "$APP_NAME" "$APP_NAME.bak$i" # Use cp so we can still kill the running one
              echo "Existing binary backed up as $APP_NAME.bak$i"
            fi
            if [ -f "$PID_FILE" ]; then
                OLD_PID=$(cat "$PID_FILE")
                if kill -0 "$OLD_PID" 2>/dev/null; then
                    echo "Stopping process $OLD_PID..."
                    kill "$OLD_PID" && sleep 2
                    kill -9 "$OLD_PID" 2>/dev/null || true
                fi
                rm "$PID_FILE"
                echo "REACHED HERE"
            fi
            echo "NEXT STEP"
            mv "$APP_DIR/tmp/$APP_NAME" "$FULL_PATH"
               
            echo "Starting $APP_NAME..."
            setsid java -jar "$FULL_PATH" > "$FULL_PATH.log" 2>&1 < /dev/null &
            sleep 5
            FINAL_PID=$(cat "$PID_FILE")
            if kill -0 "$FINAL_PID" 2>/dev/null; then
               echo "Binary started successfully (PID=$FINAL_PID)"
            else
               echo "Binary failed to start! Last 10 lines of log:"
               tail -n 10 "$FULL_PATH.log"
               exit 1
            fi

