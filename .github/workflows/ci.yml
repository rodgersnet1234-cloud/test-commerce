          SSH_HOST: ${{ secrets.HOST }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          # Prepare SSH key
          mkdir -p ~/.ssh
          echo "$SSH_USER"
          echo "$SSH_HOST"
          echo "SSH_KEY"
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

